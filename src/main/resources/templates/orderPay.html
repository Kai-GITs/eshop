<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-3">
    <h3>Pay Order</h3>

    <div th:if="${order != null}">
        <p><b>Order ID:</b> <span th:text="${order.id}"></span></p>
        <p><b>Author:</b> <span th:text="${order.author}"></span></p>
        <p><b>Status:</b> <span th:text="${order.status}"></span></p>

        <h5 class="mt-4">Pay with Voucher</h5>
        <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post" class="mb-3">
            <input type="hidden" name="method" value="VOUCHER_CODE">
            <div class="form-group">
                <label for="voucherCodeInput">Voucher Code</label>
                <input type="text" id="voucherCodeInput" name="voucherCode" class="form-control col-5"
                       placeholder="ESHOP1234ABC5678">
            </div>
            <button type="submit" class="btn btn-primary">Pay with Voucher</button>
        </form>

        <h5 class="mt-4">Pay with Bank Transfer</h5>
        <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
            <input type="hidden" name="method" value="BANK_TRANSFER">
            <div class="form-group">
                <label for="bankNameInput">Bank Name</label>
                <input type="text" id="bankNameInput" name="bankName" class="form-control col-5" placeholder="BCA">
            </div>
            <div class="form-group">
                <label for="referenceCodeInput">Reference Code</label>
                <input type="text" id="referenceCodeInput" name="referenceCode" class="form-control col-5"
                       placeholder="INV-1234">
            </div>
            <button type="submit" class="btn btn-success">Pay with Bank Transfer</button>
        </form>
    </div>

    <div th:if="${order == null}">
        <p>Order not found.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
