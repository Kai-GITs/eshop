<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-3">
    <h3>Payment Detail</h3>
    <p class="mb-3">Check your payment using payment ID.</p>

    <form th:action="@{/payment/detail}" method="get">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input type="text" name="paymentId" class="form-control mb-3 col-6" id="paymentIdInput"
                   placeholder="Enter payment ID">
        </div>
        <button type="submit" class="btn btn-primary">Check</button>
    </form>

    <div class="mt-4" th:if="${payment != null}">
        <p><b>Payment ID:</b> <span th:text="${payment.id}"></span></p>
        <p><b>Method:</b> <span th:text="${payment.method}"></span></p>
        <p><b>Status:</b> <span th:text="${payment.status}"></span></p>
    </div>

    <div class="mt-4" th:if="${payment == null and paymentId != null}">
        <p>Payment not found.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
