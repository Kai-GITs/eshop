<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-3">
    <h3>Search Order History</h3>

    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="authorInput">Author Name</label>
            <input type="text" name="author" class="form-control mb-3 col-4" id="authorInput"
                   placeholder="Enter author name">
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/order/create}" class="btn btn-outline-secondary ml-2">Create Order</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
